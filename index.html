<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أسماء</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #000;
            font-family: 'Tajawal', sans-serif; overflow: hidden; color: #fff;
        }

        .container { text-align: center; width: 90%; z-index: 10; position: relative; }

        .page { display: none; flex-direction: column; align-items: center; justify-content: center; }
        .page.active { display: flex; animation: fadeIn 1.5s ease; }

        .heart-svg { 
            width: 120px; height: 120px; fill: #ff4d4d; 
            animation: pulse 1.2s infinite; margin-bottom: 20px;
        }

        h1 { font-size: 1.6rem; margin-bottom: 30px; line-height: 1.6; color: #ffb3b3; }
        .message { font-size: 1.3rem; line-height: 1.8; color: #eee; max-width: 450px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5); }

        button {
            background: transparent; color: #ff4d4d; border: 2px solid #ff4d4d;
            padding: 12px 40px; font-size: 1.2rem; border-radius: 30px;
            cursor: pointer; transition: 0.3s; margin-top: 25px;
            font-family: 'Tajawal', sans-serif;
        }
        button:hover { background: #ff4d4d; color: #000; box-shadow: 0 0 15px #ff4d4d; }

        .always-text {
            font-size: 5rem; color: rgba(0, 150, 255, 0.4);
            font-family: 'Georgia', serif; font-style: italic;
            animation: pulse 2.5s infinite ease-in-out;
            text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        /* قلوب متساقطة */
        .falling-heart {
            position: absolute; color: #ff4d4d; pointer-events: none;
            z-index: 1; animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="player" style="position: absolute; top: -9999px; left: -9999px;"></div>

    <div class="container">
        <div id="page1" class="page active">
            <svg class="heart-svg" viewBox="0 0 32 32"><path d="M16 28.5L14.1 26.6C7.3 20.4 3 16.5 3 11.5 3 7.4 6.2 4.2 10.3 4.2 12.6 4.2 14.8 5.3 16 7.1 17.2 5.3 19.4 4.2 21.7 4.2 25.8 4.2 29 7.4 29 11.5 29 16.5 24.7 20.4 17.9 26.6L16 28.5Z"/></svg>
            <h1>نعرف بعض اكتر من 17 سنه لحد دلوقتي</h1>
            <button onclick="startApp()">التالي</button>
        </div>

        <div id="page2" class="page">
            <p class="message">
                ازيك يا اسماء ده حاجه تعبر عن الي فقلبي ليكي وبجد انت مش مجرد شخص عادي فحياتي انت ليكي منزله محدش هيوصل ليها ابدا ربنا يخليكي يارب وتكوني بخير دايما love you يا قمر😘♥️
            </p>
            <button onclick="goToPage(3)">التالي</button>
        </div>

        <div id="page3" class="page">
            <h2 class="always-text">always</h2>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'Oextk-If8HQ', 
                playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1 }
            });
        }

        function startApp() {
            if (player && player.playVideo) {
                player.playVideo(); // بتبدأ هنا عشان الأندرويد يوافق
            }
            goToPage(2);
        }

        function goToPage(pageNumber) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        // تأثير القلوب
        setInterval(() => {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'falling-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-5vh';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }, 300);
    </script>
</body>
</html>
