<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أسماء</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            color: #333;
        }

        .container {
            text-align: center;
            width: 85%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.9);
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .page { display: none; animation: fadeIn 1.2s ease-in-out forwards; }
        .page.active { display: block; }

        h1 { color: #d81b60; font-size: 1.6rem; margin-bottom: 30px; line-height: 1.6; }
        .message { font-size: 1.3rem; line-height: 1.8; color: #444; margin-bottom: 30px; }

        button {
            background: linear-gradient(45deg, #ff80ab, #ff4081);
            color: white; border: none; padding: 12px 35px;
            font-size: 1.2rem; border-radius: 50px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.3);
            transition: all 0.3s ease; font-family: 'Tajawal', sans-serif;
        }

        .always-text {
            font-size: 4.5rem;
            color: rgba(0, 150, 255, 0.35);
            font-family: 'Georgia', serif;
            font-style: italic;
            animation: pulse 2.5s infinite ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.1); opacity: 0.5; } }

        .heart {
            position: absolute; color: #ff80ab; font-size: 20px;
            pointer-events: none; animation: moveUp 6s linear infinite; z-index: 1;
        }
        @keyframes moveUp { 0% { transform: translateY(100vh); opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
